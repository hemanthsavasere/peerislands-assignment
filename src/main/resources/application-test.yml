spring:
  datasource:
    url: jdbc:h2:mem:orders;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  flyway:
    enabled: true
    validate-on-migrate: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
orders:
  scheduler:
    interval-ms: 200
